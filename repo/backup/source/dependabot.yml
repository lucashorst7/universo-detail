version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      development-tooling:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore
      include: scope
